<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Products | Koojoo Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://via.placeholder.com;">
</head>
<body class="products-page">

    <!-- NAVIGATION -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo/logo.png" alt="Koojoo Enterprise Logo">
            <span>KOOJOO <span>ENTERPRISE</span></span>
        </a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="products.html" class="active">Products</a>
            <a href="about.html">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="cart-btn-nav" onclick="toggleCart()">
                🛒 <span class="cart-count">0</span>
            </div>
            <a href="https://wa.me/233554411907" class="cta-btn" target="_blank">WhatsApp</a>
            <button class="mobile-nav-toggle" onclick="toggleMobileNav()" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="main-layout">
        <!-- CATEGORY SIDEBAR -->
        <aside class="sidebar" id="categorySidebar">
            <div class="sidebar-header">
                <h3>Categories</h3>
                <button class="mobile-close" onclick="toggleSidebar()">&times;</button>
            </div>
            <ul class="category-list" id="sidebar-categories">
                <!-- Categories injected by JS -->
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content-area">
            <header class="content-header">
                <div style="display:flex; align-items:center; gap:15px;">
                    <button class="mobile-filter-btn" onclick="toggleSidebar()">📂 Filter</button>
                    <h1 id="page-title">All <span class="highlight">Products</span></h1>
                </div>
                <div class="search-box-mini">
                    <input type="text" id="masterSearch" placeholder="Search 400+ products...">
                    <div id="searchResults" class="search-results"></div>
                </div>
            </header>

            <div class="grid-auto" id="products-grid">
                <!-- Products injected by JS -->
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('categorySidebar').classList.toggle('active');
        }
    </script>
</body>
</html>
